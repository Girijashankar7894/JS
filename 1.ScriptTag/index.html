<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- script tag inside head -->
    <script>
        console.log("Hello, World!");
    </script>

     <!-- script tag inside head with src attribute -->
     <script src="script.js"></script>
</head>
<body>
    <!-- script tag inside body -->
    <script>
        console.log("Hello, World!");
    </script>

    <!-- script tag inside body with src attribute -->
    <script src="script.js"></script>
</body>

<!-- script tag outside of head and body -->
<script>
    console.log("Hello, World!");
</script>

</html>

<!-- script tag outside of head, body and html -->
<script>
    console.log("Hello, World!");
</script>
