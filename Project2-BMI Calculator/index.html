<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>

    <!-- link external CSS -->
     <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="container">
        <h1>BMI Calculator</h1><br>
        <form id="calculator">
            <input type="number" placeholder="Height in Centimeter" class="inputFiled" required></input>
            <input type="number" placeholder="Weight in Kilogram" class="inputFiled" required></input>
            <input type="number" class="inputFiled" placeholder="Output" readonly>
            <button type="submit" id="calculate">Calculate</button>
        </form><br>
        <div id="WeightGuide">
            <p>Under Weight = Less Than 18.6</p>
            <p>Normal Range = 18.6 And 24.9</p>
            <p>Over Weight = Grater Than 24.9</p>
        </div>
    </div>

    <!-- process-01 script file -->
    <!-- <script src="./script.js"></script> -->

    <!-- process-02 script file -->
    <script src="./script1.js"></script>
</body>
</html>
