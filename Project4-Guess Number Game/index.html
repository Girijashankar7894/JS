<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Number Game</title>

    <!-- link external CSS -->
     <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="container">
        <h1>Number Guessing Game</h1>
        <p>Try the guess a random number between 1 and 100.</br>You have 10 attempts to guess the right number.</p>
        
        <form action="">
            <label for="">Guess A Number</label>
            <input type="number">
            <input type="submit">
        </form>
        
        <p id="outputSection">
            Previous Guesses: 
            <span id="previousGuesses">NA</span></br>
            Guesses Remaining: 
            <span id="guessesRemaining">10</span>
        </p>
    </div>

    <!-- link external JS -->
     <script src="./script1.js"></script>
</body>
</html>
