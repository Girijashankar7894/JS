<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Display Possibility</title>
</head>
<body>
    
    <h1>JS Display Possibility</h1>
    <p id="demo"></p>

    <script>
        // Display by using innerHTML
        document.getElementById("demo").innerHTML = "Hello JavaScript!";

        // Display by using document.write()
        document.write("Welcome to JavaScript!");

        // Display by using alert()
        alert("This is an alert box!");

        // Display by using prompt()
        var userInput = prompt("Please enter your name:");

        // Display by using confirm()
        var userConfirmation = confirm("Do you want to proceed?");
        
        // Display by using console.log()
        console.log("This is a console log message!");
    </script>

</body>
</html>
